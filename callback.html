<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in...</title>
<style>
  body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0a2540; color: #fff; text-align: center; }
  .msg { font-size: 16px; opacity: 0.8; }
  .spin { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #c8a951; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div>
  <div class="spin"></div>
  <div class="msg">Signing you in...</div>
</div>
<script>
  (function() {
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      const expiresIn = parseInt(params.get('expires_in') || '3600');
      if (token) {
        const expiry = Date.now() + (expiresIn * 1000);
        localStorage.setItem('rx_token', token);
        localStorage.setItem('rx_token_expiry', expiry.toString());
        window.location.href = 'https://akersrx.github.io/akers-rx-signature/';
        return;
      }
    }
    // No token found — go back to app anyway
    window.location.href = 'https://akersrx.github.io/akers-rx-signature/';
  })();
</script>
</body>
</html>
